<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6 shadow-sm p-4 bg-white rounded">

      <h3 class="mb-4 text-center">{{ evento.id === 0 ? 'Crear Nuevo Evento' : 'Editar Evento' }}</h3>

      <div class="mb-3">
        <label class="form-label fw-bold">Código (ID)</label>
        <input type="text" [disabled]="true" class="form-control bg-light" [(ngModel)]="evento.id">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Nombre del Evento</label>
        <input type="text" class="form-control" [(ngModel)]="evento.nombre" placeholder="Ej: Torneo de Karate">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Ubicación</label>
        <input type="text" class="form-control" [(ngModel)]="evento.ubicacion" placeholder="Ej: Coliseo UCB">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">Precio de Entrada (Bs.)</label>
        <input type="number" class="form-control" [(ngModel)]="evento.precioEntrada">
      </div>

      <div class="text-center mt-4">
        <button type="button" class="btn btn-primary me-2" (click)="guardar()">Guardar Evento</button>
        <button type="button" class="btn btn-secondary" routerLink="/eventos">Cancelar</button>
      </div>

    </div>
  </div>
</div>
