<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-10">

      <h2>Mis Eventos (EventPass)</h2>
      <br/>
      <button type="button" class="btn btn-success" routerLink="/eventos/editar/nuevo">
        + Crear Nuevo Evento
      </button>
      <br/><br/>

      <table class="table table-hover shadow-sm">
        <thead class="table-dark">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Nombre del Evento</th>
          <th scope="col">Ubicación</th>
          <th scope="col">Precio (Bs.)</th>
          <th scope="col">Acciones</th>
        </tr>
        </thead>
        <tbody class="table-group-divider">
          @for (evento of eventos; track evento.id) {
            <tr>
              <th scope="row">{{ evento.id }}</th>
              <td>{{ evento.nombre }}</td>
              <td>{{ evento.ubicacion }}</td>
              <td>{{ evento.precioEntrada }}</td>
              <td>
                <div class="btn-group" role="group">
                  <button type="button" class="btn btn-outline-primary btn-sm" [routerLink]="['/eventos/editar', evento.id]">
                    Editar
                  </button>
                  <button type="button" class="btn btn-outline-primary btn-sm" routerLink="/eventos/editar/{{evento.id}}">
                    Editar
                  </button>
                </div>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="5" class="text-center text-muted">No hay eventos registrados.</td>
            </tr>
          }
        </tbody>
      </table>

    </div>
  </div>
</div>
