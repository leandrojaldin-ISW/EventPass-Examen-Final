<div class="container mt-5 pt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-lg border-0">
        <div class="card-header bg-success text-white text-center py-3">
          <h4 class="mb-0">Formulario de Inscripción</h4>
        </div>

        <div class="card-body p-4">
          <h5 class="fw-bold">{{ evento.nombre }}</h5>
          <p class="text-muted"><i class="bi bi-geo-alt"></i> {{ evento.ubicacion }} | <i class="bi bi-calendar"></i> {{ evento.fecha | date:'shortDate' }}</p>
          <hr>

          <div class="mb-4">
            <label class="form-label fw-bold">Cantidad de Participantes:</label>
            <input type="number" class="form-control form-control-lg text-center" [(ngModel)]="cantidad" min="1" max="10">
          </div>

          <div class="p-3 mb-4 rounded-3 text-center" style="background-color: #f8f9fa; border: 2px dashed #198754;">
            <h5 class="mb-1 text-success">Total a Pagar:</h5>
            <h2 class="fw-bold mb-0">{{ cantidad * evento.precioEntrada }} Bs.</h2>
          </div>

          <div class="d-grid gap-2">
            <button class="btn btn-success btn-lg fw-bold" (click)="confirmarInscripcion()">
              Confirmar Inscripción
            </button>
            <button class="btn btn-outline-secondary" (click)="cancelar()">
              Volver al Catálogo
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
