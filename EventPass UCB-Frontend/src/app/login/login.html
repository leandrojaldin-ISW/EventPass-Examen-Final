<div class="container mt-5 pt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded-3">

        <div class="card-header bg-dark text-white text-center py-3">
          <h3 class="mb-0">EventPass UCB</h3>
          <small>Iniciar Sesión</small>
        </div>

        <div class="card-body px-5 py-4">

          @if (mensajeError) {
            <div class="alert alert-danger text-center fw-bold shadow-sm">
              {{ mensajeError }}
            </div>
          }

          <div class="mb-3">
            <label class="form-label fw-bold">Correo Electrónico</label>
            <input type="email" class="form-control form-control-lg" [(ngModel)]="correo" placeholder="ejemplo@ucb.edu.bo">
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Contraseña</label>
            <input type="password" class="form-control form-control-lg" [(ngModel)]="password" placeholder="******">
          </div>

          <div class="d-grid mt-4">
            <button class="btn btn-success btn-lg fw-bold" (click)="iniciarSesion()">
              Ingresar a la Plataforma
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
